yamlmeta:
  title: "LLM面试准备 6周路线图"
  start_week: "2026-03-02"

weeks:
  1:
    theme: "Attention / Transformer 推导"
    p1_note: "QKV→scaled dot-product→softmax→多头→O(n²)；解释sqrt(dk)/多头/梯度直觉"
    p1_exp: "手写scaled_dot_product_attention+multihead，验证shape和数值稳定"
    p1_qa: "围绕Attention在做什么、代价、怎么优化，出10条Q&A"
    p2: "数组/哈希/双指针/滑窗 5题 + 1次限时40min"
    p3: "定义Agent trace schema，开始记录≥20条"
    resume: "搭框架：教育/经历/技能/2个项目标题+事实清单"
  2:
    theme: "Transformer细节（RoPE/LayerNorm/残差/Pre-post-norm）"
    p1_note: "残差稳定训练原因；LayerNorm位置差异的训练稳定性；RoPE相对位置注入直觉"
    p1_exp: "对比pre-norm vs post-norm toy任务，产出收敛稳定性/梯度/速度对比表"
    p1_qa: "RoPE、KV cache前置概念、norm位置取舍，出10条Q&A"
    p2: "树/DFS/BFS 5题 + 1次限时"
    p3: "Failure Taxonomy v0，≥8类"
    resume: "每个项目补3条「我做了什么模块/接口/链路」"
  3:
    theme: "SFT训练流程"
    p1_note: "数据格式/loss mask/模板一致性/去重；超参lr/warmup/batch/bf16"
    p1_exp: "跑通LoRA SFT（公开小数据），训练命令+日志要点+前后对比"
    p1_qa: "SFT什么时候有效、什么时候是浪费，出10条Q&A"
    p2: "二分/堆/TopK 5题 + 1次限时"
    p3: "eval集v0，≥100条脱敏模板"
    resume: "项目bullet按「动作+对标+结果/待补」结构写"
  4:
    theme: "DPO / RLHF 对比"
    p1_note: "RLHF三段：SFT→RM→PPO；DPO直觉：为什么不需要显式RM；失败模式"
    p1_exp: "公开偏好数据子集跑通DPO(LoRA)，输出胜率/偏好一致性变化"
    p1_qa: "DPO为什么能工作/偏好数据怎么构造/对齐会伤害什么能力，出10条Q&A"
    p2: "图/BFS/拓扑4题 + DP入门2题 + 1次限时"
    p3: "失败类型→检测信号→修复策略表v0，≥10行"
    resume: "3R从「名词」改写成「可验证模块」（触发/动作/停止/消融待补）"
  5:
    theme: "推理优化①：KV Cache / vLLM / 吞吐-延迟权衡"
    p1_note: "KV cache存什么/为什么省算力；prefill vs decode瓶颈差异；三角权衡"
    p1_exp: "vLLM起服务压测：长输入短输出+短输入长输出，输出QPS/P50/P95/tokens/s/显存"
    p1_qa: "continuous batching为什么提吞吐、为什么可能伤P95，出10条Q&A"
    p2: "DP 4题 + 设计题LRU 1题 + 1次限时"
    p3: "eval runner跑通，能输出report.md"
    resume: "补上「性能/成本意识」描述素材（来自vLLM压测数据）"
  6:
    theme: "推理优化②：量化/投机采样 + RAG vs Fine-tuning选型"
    p1_note: "INT8/INT4收益与代价；投机采样原理/draft模型/accept机制；RAG vs FT选型框架"
    p1_exp: "二选一：量化前后延迟/显存/效果对比；或RAG baseline vs SFT baseline小集合对比"
    p1_qa: "量化适用场景/投机采样收益最大的条件/RAG vs FT决策树，出10条Q&A"
    p2: "综合5题 + 2次限时"
    p3: "Top3失败case复盘卡（发现→修→指标变化）"
    resume: "简历v1可投版定稿（可信证据链）"
